<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A0A12"/>
      <stop offset="100%" style="stop-color:#2D1520"/>
    </linearGradient>
    <linearGradient id="goldMain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF0A0"/>
      <stop offset="25%" style="stop-color:#F5D27A"/>
      <stop offset="50%" style="stop-color:#D4A853"/>
      <stop offset="75%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#D4A853"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFACD"/>
      <stop offset="40%" style="stop-color:#F5D27A"/>
      <stop offset="100%" style="stop-color:#8B6914"/>
    </linearGradient>
    <linearGradient id="goldSide" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5D27A"/>
      <stop offset="100%" style="stop-color:#8B6914"/>
    </linearGradient>
    <linearGradient id="rubyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="50%" style="stop-color:#C0392B"/>
      <stop offset="100%" style="stop-color:#7B241C"/>
    </linearGradient>
    <linearGradient id="sapphireGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#85C1E9"/>
      <stop offset="50%" style="stop-color:#2980B9"/>
      <stop offset="100%" style="stop-color:#1A5276"/>
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#82E0AA"/>
      <stop offset="50%" style="stop-color:#27AE60"/>
      <stop offset="100%" style="stop-color:#1D6A3A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="dGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF0A0"/>
      <stop offset="30%" style="stop-color:#F5D27A"/>
      <stop offset="70%" style="stop-color:#D4A853"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>
  
  <!-- Outer gold ring -->
  <circle cx="256" cy="256" r="242" fill="none" stroke="url(#goldMain)" stroke-width="5"/>
  <circle cx="256" cy="256" r="235" fill="none" stroke="url(#goldMain)" stroke-width="1" opacity="0.3"/>

  <!-- ══ REALISTIC CROWN ══ -->

  <!-- Crown base/band - thick with 3D depth -->
  <rect x="130" y="210" width="252" height="52" rx="6" fill="url(#goldMain)" filter="url(#shadow)"/>
  <!-- Band highlight top -->
  <rect x="130" y="210" width="252" height="12" rx="6" fill="#FFF5B0" opacity="0.35"/>
  <!-- Band shadow bottom -->
  <rect x="130" y="248" width="252" height="14" rx="0" fill="#8B6914" opacity="0.4"/>

  <!-- Band decorative engravings -->
  <rect x="155" y="218" width="2" height="36" rx="1" fill="#8B6914" opacity="0.5"/>
  <rect x="180" y="218" width="2" height="36" rx="1" fill="#8B6914" opacity="0.5"/>
  <rect x="205" y="218" width="2" height="36" rx="1" fill="#8B6914" opacity="0.5"/>
  <rect x="230" y="218" width="2" height="36" rx="1" fill="#8B6914" opacity="0.5"/>
  <rect x="282" y="218" width="2" height="36" rx="1" fill="#8B6914" opacity="0.5"/>
  <rect x="307" y="218" width="2" height="36" rx="1" fill="#8B6914" opacity="0.5"/>
  <rect x="332" y="218" width="2" height="36" rx="1" fill="#8B6914" opacity="0.5"/>
  <rect x="357" y="218" width="2" height="36" rx="1" fill="#8B6914" opacity="0.5"/>

  <!-- LEFT SPIKE -->
  <polygon points="130,212 152,105 174,212" fill="url(#goldSide)"/>
  <polygon points="138,212 152,115 166,212" fill="url(#goldShine)" opacity="0.6"/>
  <!-- Left spike highlight -->
  <line x1="152" y1="108" x2="148" y2="185" stroke="#FFF5B0" stroke-width="2" opacity="0.5"/>

  <!-- LEFT-MID SPIKE -->
  <polygon points="186,212 214,128 242,212" fill="url(#goldSide)"/>
  <polygon points="196,212 214,140" fill="url(#goldShine)" opacity="0.5"/>
  <line x1="214" y1="132" x2="210" y2="195" stroke="#FFF5B0" stroke-width="2.5" opacity="0.5"/>

  <!-- CENTER SPIKE (tallest) -->
  <polygon points="222,212 256,88 290,212" fill="url(#goldMain)" filter="url(#shadow)"/>
  <!-- Center spike 3D left face -->
  <polygon points="222,212 256,88 256,212" fill="url(#goldShine)" opacity="0.4"/>
  <!-- Center spike highlight -->
  <line x1="256" y1="92" x2="250" y2="195" stroke="#FFF9D0" stroke-width="3" opacity="0.6"/>

  <!-- RIGHT-MID SPIKE -->
  <polygon points="270,212 298,128 326,212" fill="url(#goldSide)"/>
  <polygon points="280,212 298,140 316,212" fill="#8B6914" opacity="0.3"/>
  <line x1="298" y1="132" x2="294" y2="195" stroke="#FFF5B0" stroke-width="2.5" opacity="0.5"/>

  <!-- RIGHT SPIKE -->
  <polygon points="338,212 360,105 382,212" fill="url(#goldSide)"/>
  <polygon points="346,212 360,115 374,212" fill="url(#goldShine)" opacity="0.6"/>
  <line x1="360" y1="108" x2="356" y2="185" stroke="#FFF5B0" stroke-width="2" opacity="0.5"/>

  <!-- ══ GEMS ON SPIKE TIPS ══ -->

  <!-- Left spike gem (ruby) -->
  <polygon points="152,97 144,115 160,115" fill="url(#rubyGrad)" filter="url(#glow)"/>
  <polygon points="152,97 144,115 152,108" fill="#FF9999" opacity="0.5"/>
  <circle cx="152" cy="106" r="2" fill="#FFE0E0" opacity="0.8"/>

  <!-- Left-mid spike gem (emerald) -->
  <polygon points="214,120 204,140 224,140" fill="url(#emeraldGrad)" filter="url(#glow)"/>
  <polygon points="214,120 204,140 214,132" fill="#A9DFBF" opacity="0.5"/>
  <circle cx="214" cy="130" r="2.5" fill="#E8F8F5" opacity="0.8"/>

  <!-- Center spike gem (sapphire - biggest) -->
  <polygon points="256,80 243,105 269,105" fill="url(#sapphireGrad)" filter="url(#glow)"/>
  <polygon points="256,80 243,105 256,95" fill="#AED6F1" opacity="0.6"/>
  <circle cx="256" cy="93" r="3" fill="#EBF5FB" opacity="0.9"/>

  <!-- Right-mid spike gem (emerald) -->
  <polygon points="298,120 288,140 308,140" fill="url(#emeraldGrad)" filter="url(#glow)"/>
  <polygon points="298,120 288,140 298,132" fill="#A9DFBF" opacity="0.5"/>
  <circle cx="298" cy="130" r="2.5" fill="#E8F8F5" opacity="0.8"/>

  <!-- Right spike gem (ruby) -->
  <polygon points="360,97 352,115 368,115" fill="url(#rubyGrad)" filter="url(#glow)"/>
  <polygon points="360,97 352,115 360,108" fill="#FF9999" opacity="0.5"/>
  <circle cx="360" cy="106" r="2" fill="#FFE0E0" opacity="0.8"/>

  <!-- ══ BAND GEMS ══ -->
  <!-- Center band gem -->
  <ellipse cx="256" cy="236" rx="16" ry="14" fill="url(#sapphireGrad)" stroke="#F5D27A" stroke-width="2.5" filter="url(#glow)"/>
  <ellipse cx="251" cy="231" rx="5" ry="4" fill="#AED6F1" opacity="0.6"/>

  <!-- Left band gem -->
  <ellipse cx="175" cy="236" rx="11" ry="10" fill="url(#rubyGrad)" stroke="#F5D27A" stroke-width="2" filter="url(#glow)"/>
  <ellipse cx="171" cy="232" rx="3.5" ry="3" fill="#FF9999" opacity="0.6"/>

  <!-- Right band gem -->
  <ellipse cx="337" cy="236" rx="11" ry="10" fill="url(#rubyGrad)" stroke="#F5D27A" stroke-width="2" filter="url(#glow)"/>
  <ellipse cx="333" cy="232" rx="3.5" ry="3" fill="#FF9999" opacity="0.6"/>

  <!-- Far left band gem -->
  <ellipse cx="145" cy="236" rx="8" ry="7" fill="url(#emeraldGrad)" stroke="#F5D27A" stroke-width="1.5"/>
  <!-- Far right band gem -->
  <ellipse cx="367" cy="236" rx="8" ry="7" fill="url(#emeraldGrad)" stroke="#F5D27A" stroke-width="1.5"/>

  <!-- ══ LETTER D ══ -->
  <text x="256" y="378"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="175"
    font-weight="bold"
    font-style="italic"
    text-anchor="middle"
    fill="url(#dGold)"
    filter="url(#shadow)">D</text>

  <!-- D shine overlay -->
  <text x="252" y="374"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="175"
    font-weight="bold"
    font-style="italic"
    text-anchor="middle"
    fill="#FFF5B0"
    opacity="0.12">D</text>

  <!-- Decorative bottom line -->
  <rect x="186" y="392" width="140" height="3" rx="1.5" fill="url(#goldMain)" opacity="0.7"/>
  <circle cx="222" cy="400" r="4" fill="url(#goldMain)" opacity="0.6"/>
  <circle cx="256" cy="402" r="5.5" fill="url(#goldMain)" opacity="0.8"/>
  <circle cx="290" cy="400" r="4" fill="url(#goldMain)" opacity="0.6"/>
</svg>
